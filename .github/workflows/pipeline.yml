# ✅ Start App for DAST
    - name: Start App
      run: |
        docker run -d -p 5000:5000 devsecops-app
        sleep 10

    # ✅ DAST - OWASP ZAP
    - name: OWASP ZAP Scan
      uses: zaproxy/action-baseline@v0.10.0
      with:
        target: 'http://localhost:5000'
        cmd_options: '-I'
```

⚠️ **Important:** Make sure indentation matches — each `- name:` should align with the other steps above it.

---

## After Committing

1. Go to **Actions** tab
2. Click the new running workflow
3. Wait for it to complete
4. Take screenshot of the **ZAP scan step** in the logs

---

## ⚠️ One Thing to Check

The Docker image `devsecops-app` must be **built before** this step. Your pipeline order should be:
```
1. Checkout code
2. CodeQL (SAST)
3. Docker Build        ← must come before ZAP
4. Trivy Scan
5. Start App           ← new step
6. OWASP ZAP Scan      ← new step
